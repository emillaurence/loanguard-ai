# Layer 2 — Regulatory document processing configuration
# The extraction notebook (211_extract_structure.ipynb) reads this file.
# Add new documents by appending to the 'documents' list.
# The extraction notebook processes whatever documents are listed here — no code changes required.

pdf_dir: data/layer_2/regulatory_documents

documents:

  - regulation_id: "APS-112"
    name: "Capital Adequacy: Standardised Approach to Credit Risk"
    issuing_body: "APRA"
    document_type: "prudential_standard"
    effective_date: "2025-07-01"
    is_enforceable: true
    pdf_path: "APS_112_Capital_Adequacy.pdf"
    section_id_prefix: "APS-112"
    default_severity: "mandatory"
    supplemental_prompt: |
      This is a prudential standard focused on capital adequacy and risk weights.

      THRESHOLD EXTRACTION RULE: When a requirement references multiple discrete numeric
      values for the same metric (e.g. LVR bands 60%, 70%, 80%; or risk weights 20%, 35%),
      create ONE threshold row PER value — never collapse them into a single row or store
      multiple values as an array in condition_context.

      PAY SPECIAL ATTENTION TO:
      - Attachment A contains Tables 1-4 with risk weights for property exposures.
        For Table 1 (standard residential), create ONE threshold row PER CELL:
        6 LVR bands (0-60, 60-70, 70-80, 80-90, 90-95, >95) x 2 categories
        (owner-occupied P&I, other standard) x with/without LMI.
        That is approximately 20-24 threshold rows from Table 1 alone.
      - Table 2 (non-standard residential), Table 3 (commercial — cash flow dependent),
        Table 4 (commercial — not cash flow dependent): same cell-by-cell extraction.
      - Standard vs non-standard loan classification criteria (paras 3-7 of Attachment A).
      - LVR calculation rules (paras 10-13 of Attachment A).
      - LMI eligibility criteria (paras 8-9 of Attachment A).

      Most requirements in this document are quantitative (is_quantitative: true).

  - regulation_id: "APG-223"
    name: "Residential Mortgage Lending"
    issuing_body: "APRA"
    document_type: "practice_guide"
    effective_date: "2024-12-01"
    is_enforceable: false
    pdf_path: "APG_223_Residential_Mortgage_Lending.pdf"
    section_id_prefix: "APG-223"
    default_severity: "expected"
    supplemental_prompt: |
      This is a prudential PRACTICE GUIDE, not a binding standard.

      Requirements should have severity "expected" (for strong expectations using language
      like "APRA expects") or "recommended" (for good practice using language like
      "a prudent ADI would").

      THRESHOLD EXTRACTION RULE: When a requirement references multiple discrete numeric
      values for the same metric (e.g. multiple income haircut percentages or expense
      floor amounts), create ONE threshold row PER value — never collapse them into a
      single row or store multiple values as an array in condition_context.

      PAY SPECIAL ATTENTION TO:
      - Loan origination criteria and channels (including broker origination)
      - Serviceability assessment methodology (interest rate buffer, expenses, income haircuts)
      - Overrides framework (frequency, materiality, monitoring)
      - Collateral valuation practices (independence, qualifications, methods)
      - Lenders mortgage insurance (LMI is not a substitute for due diligence)
      - Stress testing expectations
      - Serviceability buffer: 1 threshold → minimum 3 percentage points above loan rate
      - Income haircuts: where discrete percentages are specified, one threshold per
        haircut rate (e.g. different rates for PAYG vs self-employed vs rental income)
      - Expense floors: where numeric HEM or floor amounts are referenced, one threshold
        per discrete floor value

      This document has fewer quantitative thresholds but rich qualitative requirements.

  - regulation_id: "APS-220"
    name: "Credit Risk Management"
    issuing_body: "APRA"
    document_type: "prudential_standard"
    effective_date: "2022-01-01"
    is_enforceable: true
    pdf_path: "APS_220_Credit_Risk_Management.pdf"
    section_id_prefix: "APS-220"
    default_severity: "mandatory"
    supplemental_prompt: |
      This is a prudential standard covering the overall credit risk management framework.

      THRESHOLD EXTRACTION RULE: When a requirement references multiple discrete numeric
      values for the same metric (e.g. 30, 60, 90 days past-due; or multiple provision
      percentages), create ONE threshold row PER value — never collapse them into a single
      row or store multiple values as an array in condition_context.

      PAY SPECIAL ATTENTION TO:
      - Credit risk appetite statement requirements
      - Credit assessment and approval process (paras 31-50)
      - Collateral valuation requirements in Attachment A (independence, fair value,
        professional qualifications, ongoing monitoring)
      - Provisioning requirements in Attachment B
      - Classification of exposures (performing, significantly deteriorated, non-performing)
      - Outsourcing of credit functions (reference to CPS 231)
      - Override policies and monitoring
      - Past-due classification buckets: create 3 separate thresholds — 30 days, 60 days,
        and 90 days — each as its own threshold row with the day count as the value
      - Non-performing trigger: 1 threshold → 90 days past-due (separate from the
        classification buckets above as it has a distinct consequence)
      - Probation periods: 2 thresholds → 90 days and 6 months (reclassification back
        to performing), each as its own threshold row
      - Attachment B prescribed provisioning: 4 thresholds — one per category (Category 1
        through 4), with the minimum provision percentage as the value and the days
        past-due / irregularity period as condition_context

      Attachment A (Collateral and security valuation) is critical — it defines
      the valuation standards that feed into APS 112's LVR calculations.
